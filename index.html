<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>李婉小宝宝 · 专属浪漫告白</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(145deg, #FFD0E0 0%, #FFB0C8 100%);
            font-family: 'Segoe UI', 'PingFang SC', 'Helvetica Neue', system-ui, -apple-system, 'Noto Sans', cursive;
            touch-action: manipulation;
            position: relative;
        }

        /* 3D画布容器 */
        #canvas3d {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 1;
            opacity: 0;
            transition: opacity 2s ease;
        }

        /* 主界面UI层 */
        .ui-container {
            position: relative;
            z-index: 20;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            pointer-events: none;
            transition: all 0.5s ease;
        }

        .clickable {
            pointer-events: auto;
        }

        /* 标题卡片 */
        .question-card {
            background: rgba(255, 235, 245, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 68px 48px 72px 48px;
            padding: 2rem 2rem;
            width: 85%;
            max-width: 380px;
            margin: 0 auto;
            box-shadow: 0 30px 45px rgba(255, 80, 120, 0.3), 0 0 0 3px rgba(255, 200, 220, 0.8) inset;
            animation: floatCard 3s infinite ease-in-out;
            border: 1px solid #FFA5C0;
        }

        .big-question {
            font-size: clamp(1.6rem, 7vw, 2.4rem);
            font-weight: 800;
            background: linear-gradient(135deg, #E8436E, #FF6B8E, #FFA0C0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }

        .baby-name-display {
            font-size: 1.2rem;
            color: #D43F6B;
            background: rgba(255, 220, 235, 0.7);
            display: inline-block;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            margin-bottom: 1.2rem;
            font-weight: 500;
        }

        /* 按钮组 */
        .button-group {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn {
            border: none;
            padding: 0.9rem 1.8rem;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            font-family: inherit;
            min-width: 110px;
            text-align: center;
        }

        .btn-yes {
            background: linear-gradient(120deg, #FF7A9E, #FF4D7A);
            color: white;
            border: 2px solid #FFC0D5;
            transform: scale(1);
            box-shadow: 0 8px 25px #FF5A8A;
        }

        .btn-no {
            background: rgba(200, 200, 210, 0.8);
            backdrop-filter: blur(5px);
            color: #5E3A4A;
            border: 1px solid #FFB0C0;
            transition: all 0.15s cubic-bezier(0.34, 1.2, 0.64, 1);
        }

        /* 弹幕容器 */
        .danmaku-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 30;
            overflow: hidden;
        }

        .danmaku-item {
            position: absolute;
            white-space: nowrap;
            font-size: 1.2rem;
            font-weight: bold;
            color: #FF3B6F;
            text-shadow: 0 0 5px #FFC0E0;
            animation: fly linear forwards;
            z-index: 35;
            font-family: 'Segoe UI', 'PingFang SC', cursive;
        }

        /* 拒绝后的提示浮层 */
        .reject-toast {
            position: fixed;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            color: #FFE0EC;
            padding: 0.8rem 1.6rem;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
            z-index: 40;
            animation: fadeOut 1.8s forwards;
            white-space: nowrap;
            pointer-events: none;
            border: 1px solid #FF90B0;
        }

        /* 成功后的爱心爆炸容器 */
        .heart-explosion {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 45;
        }

        .float-heart {
            position: absolute;
            font-size: 1.8rem;
            animation: floatUp 1.5s ease-out forwards;
            filter: drop-shadow(0 0 6px #FF5480);
        }

        @keyframes floatCard {
            0% { transform: translateY(0px);}
            50% { transform: translateY(-8px);}
            100% { transform: translateY(0px);}
        }

        @keyframes fly {
            0% { transform: translateX(100vw); opacity: 1; }
            100% { transform: translateX(-250px); opacity: 0; }
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: translateX(-50%) scale(1); }
            70% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) scale(0.9); visibility: hidden; }
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.6); opacity: 1; }
            100% { transform: translateY(-200px) scale(1.2); opacity: 0; }
        }

        /* 成功画面大标题 */
        .success-title {
            position: fixed;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(255, 240, 245, 0.9);
            backdrop-filter: blur(30px);
            padding: 1rem 2rem;
            border-radius: 100px;
            font-size: 2.2rem;
            font-weight: 800;
            color: #E8436E;
            white-space: nowrap;
            z-index: 50;
            animation: popScale 0.5s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
            border: 2px solid #FFB0D0;
            text-align: center;
        }

        @keyframes popScale {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            80% { transform: translate(-50%, -50%) scale(1.1); }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        /* 3D画布激活时隐藏UI部分元素 */
        .hidden-ui {
            opacity: 0;
            visibility: hidden;
            transition: 0.4s;
        }

        .visible-ui {
            opacity: 1;
            visibility: visible;
        }

        /* 底部小提示 */
        .hint {
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #FF80A0;
            background: rgba(255,255,240,0.5);
            padding: 0.3rem 1rem;
            border-radius: 30px;
            display: inline-block;
        }
    </style>
</head>
<body>

<!-- 3D 粒子爱心画布 -->
<canvas id="canvas3d"></canvas>

<!-- 弹幕专用层 -->
<div id="danmakuContainer" class="danmaku-container"></div>
<div id="explosionContainer" class="heart-explosion"></div>

<div class="ui-container" id="uiContainer">
    <div class="question-card clickable">
        <div class="big-question">✨ 可以成为我的恋人吗？ ✨</div>
        <div class="baby-name-display">💗 最可爱的 李婉小宝宝 💗</div>
        <div class="button-group">
            <button class="btn btn-yes clickable" id="yesBtn">💖 可以 💖</button>
            <button class="btn btn-no clickable" id="noBtn">😢 不要</button>
        </div>
        <div class="hint">✦ 悄悄告诉你，拒绝我会心疼的 ✦</div>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';

    // ------------------------- 3D 粉红爱心粒子 (立体旋转) -------------------------
    const canvas3d = document.getElementById('canvas3d');
    const scene = new THREE.Scene();
    scene.background = null; // 透明背景，透出css渐变
    scene.fog = new THREE.FogExp2(0xFFD0E0, 0.008);
    
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 35);
    camera.lookAt(0, 0, 0);
    
    const renderer = new THREE.WebGLRenderer({ canvas: canvas3d, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setClearColor(0x000000, 0); // 透明
    
    // 心形参数方程
    const heartPoints = [];
    const particleCount = 3800;
    const positions = new Float32Array(particleCount * 3);
    
    // 生成心形点云 (范围标准化)
    for (let i = 0; i < particleCount; i++) {
        // 采用参数t，增加厚度
        const t = Math.random() * Math.PI * 2;
        const xRaw = 16 * Math.pow(Math.sin(t), 3);
        const yRaw = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
        // 加入随机厚度z
        const zOffset = (Math.random() - 0.5) * 4.2;
        // 随机缩放比例让爱心更丰满
        const scaleFactor = 0.72;
        let x = xRaw * scaleFactor + (Math.random() - 0.5) * 0.45;
        let y = yRaw * scaleFactor + (Math.random() - 0.5) * 0.45;
        let z = zOffset * 1.2;
        
        // 增加内部填充: 有一部分粒子在内部更密集
        if (Math.random() > 0.65) {
            const innerT = Math.random() * Math.PI * 2;
            const ix = 16 * Math.pow(Math.sin(innerT), 3);
            const iy = 13 * Math.cos(innerT) - 5 * Math.cos(2*innerT) - 2*Math.cos(3*innerT) - Math.cos(4*innerT);
            x = ix * scaleFactor * 0.85 + (Math.random() - 0.5) * 0.7;
            y = iy * scaleFactor * 0.85 + (Math.random() - 0.5) * 0.7;
            z = (Math.random() - 0.5) * 3.2;
        }
        
        positions[i*3] = x;
        positions[i*3+1] = -y; // 让心形正向
        positions[i*3+2] = z;
    }
    
    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    
    // 粉红色渐变粒子材质
    const colors = [];
    for (let i = 0; i < particleCount; i++) {
        const rand = Math.random();
        // 粉红到淡红到玫瑰色
        const r = 1.0;
        const g = 0.5 + Math.random() * 0.3;
        const b = 0.6 + Math.random() * 0.35;
        colors.push(r, g, b);
    }
    geometry.setAttribute('color', new THREE.BufferAttribute(new Float32Array(colors), 3));
    
    const particleMaterial = new THREE.PointsMaterial({
        size: 0.28,
        vertexColors: true,
        transparent: true,
        opacity: 0.95,
        blending: THREE.AdditiveBlending
    });
    
    const heartParticles = new THREE.Points(geometry, particleMaterial);
    scene.add(heartParticles);
    
    // 添加背景光晕星星粒子 (小光点)
    const starGeo = new THREE.BufferGeometry();
    const starCount = 1200;
    const starPos = [];
    for (let i = 0; i < starCount; i++) {
        starPos.push((Math.random() - 0.5) * 200);
        starPos.push((Math.random() - 0.5) * 120);
        starPos.push((Math.random() - 0.5) * 80 - 40);
    }
    starGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPos), 3));
    const starMat = new THREE.PointsMaterial({ color: 0xFFA5C2, size: 0.12, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending });
    const starsField = new THREE.Points(starGeo, starMat);
    scene.add(starsField);
    
    let timeRotate = 0;
    
    function animate3D() {
        requestAnimationFrame(animate3D);
        timeRotate += 0.005;
        // 爱心整体缓慢旋转和上下浮动
        heartParticles.rotation.y = Math.sin(timeRotate * 0.3) * 0.2;
        heartParticles.rotation.x = Math.sin(timeRotate * 0.5) * 0.1;
        heartParticles.rotation.z = Math.sin(timeRotate * 0.4) * 0.15;
        starsField.rotation.y += 0.0005;
        starsField.rotation.x += 0.0003;
        // 相机轻微摆动
        camera.position.x = Math.sin(timeRotate * 0.2) * 0.6;
        camera.position.y = Math.cos(timeRotate * 0.23) * 0.4;
        camera.lookAt(0, 0, 0);
        
        renderer.render(scene, camera);
    }
    animate3D();
    
    window.addEventListener('resize', onWindowResize, false);
    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }
    
    // ------------------------- 俏皮按钮逻辑 + 拒绝彩蛋 -------------------------
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const uiContainer = document.getElementById('uiContainer');
    let rejectCount = 0;
    let successTriggered = false;
    
    // 拒绝文案彩蛋
    const rejectMessages = [
        "🥺 再想想嘛 ~",
        "💔 我的心好痛... 再考虑一下？",
        "你舍得吗？我超可爱的 ✨",
        "哼，你一定是点错了叭！(◞‸◟)",
        "好吧好吧～ 其实你超爱我的对不对？❤️"
    ];
    
    function showRejectToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'reject-toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.remove();
        }, 1800);
    }
    
    function updateNoButton() {
        if (successTriggered) return;
        if (rejectCount >= 5) {
            // 第五次之后，不要按钮彻底变成「好吧我超爱你❤️」并且触发成功
            noBtn.innerText = '💗 好吧我超爱你 💗';
            noBtn.style.background = "linear-gradient(120deg, #FF8AAE, #FF5E8E)";
            noBtn.style.color = "white";
            noBtn.style.border = "2px solid #FFE0F0";
            // 自动触发成功
            triggerSuccess();
            return;
        }
        
        // 让不要按钮尺寸缩小 + 根据拒绝次数移动位置
        let scaleValue = Math.max(0.55, 1 - rejectCount * 0.12);
        noBtn.style.transform = `scale(${scaleValue})`;
        if (rejectCount >= 2) {
            // 随机偏移，俏皮逃跑效果 (轻微位移)
            const offsetX = (Math.random() - 0.5) * 25;
            const offsetY = (Math.random() - 0.5) * 20;
            noBtn.style.transform += ` translate(${offsetX}px, ${offsetY}px)`;
        }
        if (rejectCount >= 3) {
            noBtn.style.opacity = '0.7';
        }
        if (rejectCount === 4) {
            noBtn.innerText = '😭 别点我啦';
        } else if (rejectCount < 4) {
            noBtn.innerText = rejectCount >= 2 ? '🥺 不要嘛' : '😢 不要';
        }
        
        // 同时可以按钮逐渐变大 (诱惑)
        const yesScale = 1 + rejectCount * 0.07;
        yesBtn.style.transform = `scale(${Math.min(yesScale, 1.35)})`;
        yesBtn.style.boxShadow = `0 0 15px #FF6B9E`;
    }
    
    // 满屏弹幕 + 爱心爆炸
    function startDanmakuAndExplosion() {
        // 弹幕: 满屏「李婉我喜欢你」「李婉小宝宝」「爱你哟」
        const phrases = ["💖 李婉我喜欢你 💖", "🌸 李婉小宝宝 🌸", "✨ 爱你一万年 ✨", "💗 超超超喜欢你 💗", "🥰 婉婉最可爱 🥰", "❤️ 在一起一辈子 ❤️"];
        const container = document.getElementById('danmakuContainer');
        for (let i = 0; i < 48; i++) {
            setTimeout(() => {
                const dan = document.createElement('div');
                dan.className = 'danmaku-item';
                const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];
                dan.innerText = randomPhrase;
                const size = 1 + Math.random() * 1.2;
                dan.style.fontSize = `${size}rem`;
                dan.style.top = `${Math.random() * 85 + 5}%`;
                dan.style.animationDuration = `${6 + Math.random() * 5}s`;
                dan.style.animationDelay = '0s';
                dan.style.color = `hsl(${330 + Math.random() * 20}, 85%, 65%)`;
                dan.style.fontWeight = 'bold';
                container.appendChild(dan);
                setTimeout(() => dan.remove(), 11000);
            }, i * 180);
        }
        
        // 爱心爆炸效果 (大量上升爱心)
        const explosionDiv = document.getElementById('explosionContainer');
        for (let i = 0; i < 150; i++) {
            setTimeout(() => {
                const heartSpan = document.createElement('div');
                heartSpan.className = 'float-heart';
                heartSpan.innerHTML = ['❤️', '💖', '💗', '💓', '🌸', '✨', '💕'][Math.floor(Math.random() * 7)];
                heartSpan.style.left = `${Math.random() * 100}%`;
                heartSpan.style.bottom = `-20px`;
                heartSpan.style.fontSize = `${1.2 + Math.random() * 2}rem`;
                heartSpan.style.animationDuration = `${1 + Math.random() * 1.5}s`;
                explosionDiv.appendChild(heartSpan);
                setTimeout(() => heartSpan.remove(), 2000);
            }, i * 35);
        }
    }
    
    // 成功后的核心逻辑: 隐藏原来UI，显示3D爱心最大，出现成功文字
    function triggerSuccess() {
        if (successTriggered) return;
        successTriggered = true;
        
        // 隐藏原有按钮卡片但保留ui层逐渐透明
        uiContainer.style.transition = "opacity 0.8s";
        uiContainer.style.opacity = "0";
        uiContainer.style.pointerEvents = "none";
        
        // 显示3D canvas全效
        canvas3d.style.opacity = "1";
        
        // 满屏弹幕与爱心爆炸
        startDanmakuAndExplosion();
        
        // 创建成功大标题
        const successDiv = document.createElement('div');
        successDiv.className = 'success-title';
        successDiv.innerHTML = '✨ 李婉小宝宝，我们在一起啦 ✨';
        document.body.appendChild(successDiv);
        
        // 额外飘落心形花瓣效果 (粉色花瓣)
        for (let i = 0; i < 100; i++) {
            setTimeout(() => {
                const petal = document.createElement('div');
                petal.style.position = 'fixed';
                petal.style.left = `${Math.random() * 100}%`;
                petal.style.top = `-20px`;
                petal.style.fontSize = `${1.2 + Math.random() * 1.8}rem`;
                petal.style.pointerEvents = 'none';
                petal.style.zIndex = '55';
                petal.innerHTML = ['🌸', '💗', '❤️', '💖', '✨', '🌹'][Math.floor(Math.random() * 6)];
                petal.style.animation = `floatUp 2s ease-out forwards`;
                document.body.appendChild(petal);
                setTimeout(() => petal.remove(), 2000);
            }, i * 40);
        }
        
        // 拒绝按钮完全移除
        if (noBtn && noBtn.parentNode) noBtn.style.display = 'none';
        // 确保 yes 按钮动画
        yesBtn.style.transform = 'scale(1.2)';
        yesBtn.innerText = '❤️ 答应啦 ❤️';
        
        // 在控制台输出浪漫
        console.log("%c✨ 李婉小宝宝，告白成功 ✨", "color:#FF4D7A; font-size:18px;");
    }
    
    // 点击「可以」按钮
    yesBtn.addEventListener('click', (e) => {
        e.preventDefault();
        if (successTriggered) return;
        triggerSuccess();
    });
    
    // 点击「不要」按钮
    noBtn.addEventListener('click', (e) => {
        e.preventDefault();
        if (successTriggered) return;
        rejectCount++;
        if (rejectCount <= 5) {
            const msgIndex = Math.min(rejectCount - 1, rejectMessages.length - 1);
            showRejectToast(rejectMessages[msgIndex]);
            updateNoButton();
        } else {
            // 超过五次依然调用最终成功
            triggerSuccess();
        }
        // 如果拒绝已经到5次以上在updateNoButton里已经触发成功
        if (rejectCount === 5) {
            updateNoButton(); // 会触发 triggerSuccess
        }
    });
    
    // 增加额外俏皮: 鼠标靠近「不要」按钮时轻微偏移 (电脑hover 手机touch模拟)
    noBtn.addEventListener('mouseenter', () => {
        if (successTriggered) return;
        if (rejectCount >= 2) {
            const offsetX = (Math.random() - 0.5) * 18;
            const offsetY = (Math.random() - 0.5) * 15;
            noBtn.style.transform += ` translate(${offsetX}px, ${offsetY}px)`;
            setTimeout(() => {
                if (!successTriggered) noBtn.style.transform = noBtn.style.transform.replace(/translate\(.*?\)/, '');
            }, 200);
        }
    });
    
    // 初始化稍微让3D画布渐显
    setTimeout(() => {
        canvas3d.style.opacity = "1";
    }, 500);
    
    // 响应窗口适配3D渲染
    onWindowResize();
</script>
</body>
</html>
